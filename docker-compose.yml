version: '3.9'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: trustengine
      POSTGRES_USER: trust
      POSTGRES_PASSWORD: trust123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trust -d trustengine"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  fraud-scorer:
    build: ./fraud-scorer
    ports:
      - "8001:8001"
    environment:
      MODEL_PATH: /app/model/fraud_model.pkl
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  listing-service:
    build: ./listing-service
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
      fraud-scorer:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/trustengine
      SPRING_DATASOURCE_USERNAME: trust
      SPRING_DATASOURCE_PASSWORD: trust123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      FRAUD_SCORER_URL: http://fraud-scorer:8001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

volumes:
  postgres_data:
