spring:
  application:
    name: marketplace-trust-engine

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/trustengine}
    username: ${SPRING_DATASOURCE_USERNAME:trust}
    password: ${SPRING_DATASOURCE_PASSWORD:trust123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: trust-engine
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.offerup.trust.*"

fraud-scorer:
  url: ${FRAUD_SCORER_URL:http://localhost:8001}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

kafka:
  topics:
    listing-submitted: listing-submitted
    listing-scored: listing-scored
    listing-flagged: listing-flagged

trust:
  fraud-threshold: 0.65
  review-threshold: 0.45
  reputation:
    ttl-seconds: 3600
    velocity-window-minutes: 60
    max-listings-per-window: 10

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
